openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Staff Application Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Discord OAuth2 authentication
  - name: applications
    description: Staff applications
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /applications:
    post:
      operationId: submitApplication
      tags: [applications]
      summary: Submit a staff application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationInput"
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Blacklisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /applications/stats:
    get:
      operationId: getApplicationStats
      tags: [applications]
      summary: Get application statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
        bot:
          type: object
          properties:
            connected:
              type: boolean
            tag:
              type: string
              nullable: true
            uptime:
              type: number
            guilds:
              type: integer
          required: [connected, uptime, guilds]
      required:
        - status

    AuthUser:
      type: object
      required:
        - id
        - username
        - avatar
        - discriminator
      properties:
        id:
          type: string
        username:
          type: string
        avatar:
          type: string
          nullable: true
        discriminator:
          type: string

    SuccessResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean

    ApplicationInput:
      type: object
      required:
        - discordUsername
        - discordId
        - role
        - age
        - timezone
        - experience
        - whyJoin
        - availability
      properties:
        discordUsername:
          type: string
          minLength: 2
        discordId:
          type: string
          minLength: 17
        role:
          type: string
          enum: [Moderator, "Human Resources", Partnership]
        age:
          type: integer
          minimum: 13
        timezone:
          type: string
        experience:
          type: string
          minLength: 20
        whyJoin:
          type: string
          minLength: 20
        availability:
          type: string

    Application:
      type: object
      required:
        - id
        - discordUsername
        - discordId
        - role
        - age
        - timezone
        - experience
        - whyJoin
        - availability
        - status
        - createdAt
      properties:
        id:
          type: integer
        discordUsername:
          type: string
        discordId:
          type: string
        role:
          type: string
        age:
          type: integer
        timezone:
          type: string
        experience:
          type: string
        whyJoin:
          type: string
        availability:
          type: string
        status:
          type: string
        createdAt:
          type: string

    ApplicationStats:
      type: object
      required:
        - total
        - pending
        - accepted
        - denied
      properties:
        total:
          type: integer
        pending:
          type: integer
        accepted:
          type: integer
        denied:
          type: integer

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
